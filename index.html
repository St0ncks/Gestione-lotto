<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Saldi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --info: #17a2b8;
        }

        body {
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: var(--primary);
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        /* STATS SECTION */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border-left: 4px solid var(--primary);
        }

        .stat-card.success { border-left-color: var(--success); }
        .stat-card.danger { border-left-color: var(--danger); }
        .stat-card.warning { border-left-color: var(--warning); }

        .stat-card h3 {
            font-size: 12px;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-card.success .value { color: var(--success); }
        .stat-card.danger .value { color: var(--danger); }

        /* TOOLBAR */
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px 10px 35px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-warning {
            background: var(--warning);
            color: black;
        }

        .btn-warning:hover {
            background: #e0a800;
        }

        .btn-info {
            background: var(--info);
            color: white;
        }

        .btn-info:hover {
            background: #138496;
        }

        .btn-sm {
            padding: 8px 12px;
            font-size: 12px;
        }

        .btn-icon {
            width: 40px;
            padding: 0;
            justify-content: center;
        }

        /* FORM SECTION */
        .form-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .form-section h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .form-group {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 10px;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .form-group {
                grid-template-columns: 1fr;
            }
        }

        input[type="text"],
        input[type="number"] {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* USER LIST */
        .user-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .user-list {
                grid-template-columns: 1fr;
            }
        }

        .user-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }

        .user-card:hover {
            border-color: var(--primary);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.1);
            transform: translateY(-5px);
        }

        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .user-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            word-break: break-word;
        }

        .user-balance {
            font-size: 20px;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 6px;
            background: #f0f0f0;
        }

        .balance-positive { 
            color: var(--success);
            background: #d4edda;
        }

        .balance-zero { 
            color: #d39e00;
            background: #fff3cd;
        }

        .balance-negative { 
            color: var(--danger);
            background: #f8d7da;
        }

        .user-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .user-actions button {
            flex: 1;
            min-width: 80px;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s;
        }

        .modal.show {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { 
                transform: translateY(-50px);
                opacity: 0;
            }
            to { 
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .modal-header h2 {
            margin: 0;
            color: #333;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
            padding: 0;
            width: auto;
            height: auto;
        }

        .modal-close:hover {
            color: #333;
            transform: none;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .modal-body input,
        .modal-body textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            font-family: inherit;
        }

        .modal-body textarea {
            resize: vertical;
            min-height: 100px;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* LOG SECTION */
        .log-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .log-section h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .log-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .log-item {
            background: white;
            padding: 12px;
            border-left: 4px solid var(--primary);
            margin-bottom: 10px;
            border-radius: 4px;
            font-size: 13px;
            color: #555;
        }

        .log-item.debit {
            border-left-color: var(--danger);
        }

        .log-item.credit {
            border-left-color: var(--success);
        }

        .log-timestamp {
            color: #999;
            font-size: 11px;
        }

        /* NOTIFICATIONS */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            animation: slideInRight 0.3s, slideOutRight 0.3s 3s forwards;
            z-index: 2000;
        }

        @keyframes slideInRight {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOutRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(400px); opacity: 0; }
        }

        .notification.success {
            background: var(--success);
        }

        .notification.error {
            background: var(--danger);
        }

        .notification.info {
            background: var(--info);
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state h3 {
            margin-bottom: 10px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .container {
                max-width: 100%;
            }

            .header h1 {
                font-size: 24px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .toolbar {
                flex-direction: column;
            }

            .search-box {
                min-width: 100%;
            }

            .button-group {
                width: 100%;
            }

            .button-group button {
                flex: 1;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>💰 Gestione Saldi</h1>
        <p>Traccia i saldi degli utenti con facilità</p>
    </div>

    <div class="content">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Utenti Totali</h3>
                <div class="value" id="totalUsers">0</div>
            </div>
            <div class="stat-card success">
                <h3>In Credito</h3>
                <div class="value" id="creditUsers">0</div>
            </div>
            <div class="stat-card danger">
                <h3>In Debito</h3>
                <div class="value" id="debtUsers">0</div>
            </div>
            <div class="stat-card">
                <h3>Deposito Totale</h3>
                <div class="value" id="totalDeposit">0.00 €</div>
            </div>
        </div>

        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Cerca utente...">
            </div>
            <div class="button-group">
                <button class="btn-primary" onclick="openAddUserModal()">➕ Aggiungi Utente</button>
                <button class="btn-info" onclick="openDebitAllModal()">➖ Detrai 1€ a Tutti</button>
                <button class="btn-warning" onclick="toggleHistory()">📋 Storico</button>
                <button class="btn-info" onclick="undoAction()" id="undoBtn">↶ Annulla</button>
                <button class="btn-success" id="exportBtn" onclick="exportData()">📥 Esporta</button>
                <button class="btn-info" id="importBtn" onclick="document.getElementById('importFile').click()">📤 Importa</button>
                <button class="btn-danger" onclick="resetAll()">🗑️ Ripristina</button>
            </div>
        </div>
        <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importData(event)">

        <div class="form-section" id="formSection" style="display: none;">
            <h3>Operazione Rapida</h3>
            <div class="form-group">
                <input type="text" id="quickName" placeholder="Nome Utente">
                <input type="number" id="quickBalance" placeholder="Saldo (€)" step="0.01">
                <button class="btn-success" onclick="addUserQuick()">Aggiungi</button>
            </div>
        </div>

        <div id="userListContainer"></div>

        <div class="log-section" id="logSection" style="display: none;">
            <h3>📝 Storico Operazioni</h3>
            <div class="log-list" id="logList"></div>
            <button class="btn-danger btn-sm" onclick="clearLogs()" style="margin-top: 10px;">Cancella Storico</button>
        </div>
    </div>
</div>

<div id="userModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="userModalTitle">Aggiungi Utente</h2>
            <button class="modal-close" onclick="closeModal('userModal')">✕</button>
        </div>
        <div class="modal-body">
            <input type="text" id="modalUserName" placeholder="Nome Utente">
            <input type="number" id="modalUserBalance" placeholder="Saldo (€)" step="0.01">
        </div>
        <div class="modal-footer">
            <button class="btn-primary" onclick="saveUser()">Salva</button>
            <button class="btn-danger" onclick="closeModal('userModal')">Annulla</button>
        </div>
    </div>
</div>

<div id="debitModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Detrai 1€ a Tutti</h2>
            <button class="modal-close" onclick="closeModal('debitModal')">✕</button>
        </div>
        <div class="modal-body">
            <p>Sei sicuro di voler detrarre 1€ da tutti i saldi?</p>
            <textarea id="debitNote" placeholder="Aggiungi una nota (opzionale)..."></textarea>
        </div>
        <div class="modal-footer">
            <button class="btn-success" onclick="confirmDebitAll()">Procedi</button>
